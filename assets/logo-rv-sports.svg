<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-labelledby="title desc">
  <title id="title">RV SPORTS</title>
  <desc id="desc">Símbolo circular rosa com RV em branco e o nome RV SPORTS.</desc>
  <defs>
    <linearGradient id="pinkBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4fc7"/>
      <stop offset="0.48" stop-color="#f20aa6"/>
      <stop offset="1" stop-color="#c70080"/>
    </linearGradient>
    <linearGradient id="pinkText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff55ca"/>
      <stop offset="1" stop-color="#e30097"/>
    </linearGradient>
    <filter id="badgeShadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f20aa6" flood-opacity="0.30"/>
    </filter>
    <filter id="textShadow" x="-15%" y="-30%" width="130%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="badgeClip">
      <circle cx="68" cy="70" r="56"/>
    </clipPath>
  </defs>

  <g filter="url(#badgeShadow)">
    <circle cx="68" cy="70" r="56" fill="url(#pinkBadge)"/>
    <ellipse cx="68" cy="45" rx="47" ry="31" fill="#ffffff" opacity="0.13" clip-path="url(#badgeClip)"/>
    <path d="M22 91c14 21 34 31 59 30 18-1 32-7 43-17" fill="none" stroke="#7e0050" stroke-opacity="0.22" stroke-width="5" stroke-linecap="round"/>
    <circle cx="68" cy="70" r="54.5" fill="none" stroke="#ff88dc" stroke-opacity="0.34" stroke-width="2"/>
  </g>

  <g filter="url(#textShadow)" font-family="Inter, Montserrat, Arial, sans-serif" font-weight="900">
    <text x="68" y="86" text-anchor="middle" font-size="48" fill="#ffffff" letter-spacing="-3">RV</text>
    <text x="144" y="89" font-size="55" fill="url(#pinkText)" letter-spacing="-3">RV</text>
    <text x="244" y="89" font-size="51" fill="#ffffff" letter-spacing="1">SPORTS</text>
  </g>
</svg>
